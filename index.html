<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naga Lost-And-Found System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    
    <div class="topHeader">
        <div class="appNameContainer">
            <img src="iBalik Icon.png" style="height: 110px;">
        </div>
        <div id="searchContainer">
            <input id="searchBar" type="text" placeholder="Search">
            <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
        </div>
        <button id="reportButton">Report Item</button>
    </div>

    <div class="categoriesContainer">
        <button id="AllTypes">All Types</button>
        <button id="Bag">Bag</button>
        <button id="Wallet">Wallet</button>
        <button id="Umbrella">Umbrella</button>
        <button id="Keys">Keys</button>
        <button id="Tumbler">Tumbler</button>
        <button id="Electronics">Electronics</button>
        <button id="SchoolItems">School Items</button>
        <button id="Clothing">Clothing</button>
        <button id="Accessories">Accessories</button>
        <button id="Documents">Documents</button>
        <button id="Other">Other</button>
    </div>

    <div class="itemsWrapper">
        <div class="itemsContainer"></div> 
    </div>

    <script src="index.js"></script>
</body>
</html>
